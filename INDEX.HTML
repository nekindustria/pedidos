<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEK - Sistema de Pedidos v3.2.7-LS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --blue: #2c3e50;
            --accent: #3498db;
            --green: #27ae60;
            --red: #e74c3c;
            --light: #f4f7f6;
            --yellow: #fff9c4;
            --purple: #8e44ad;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--light);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* VIEWS CONTROL */
        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        .container {
            max-width: 1550px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--blue);
            position: relative;
        }

        /* LOGIN STYLES */
        .login-container {
            max-width: 400px !important;
            margin-top: 50px;
            text-align: center;
        }

        .login-box input {
            margin-bottom: 15px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #1a252f;
        }

        .logo-login {
            font-size: 40px;
            margin-bottom: 20px;
            display: block;
        }

        /* ADMIN STYLES */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .user-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .user-list th,
        .user-list td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: left;
        }

        .user-list th {
            background: var(--blue);
            color: white;
        }

        .admin-controls {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: flex;
            gap: 10px;
            align-items: end;
        }

        /* GENERAL STYLES */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--blue);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .status-sync {
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .sync-success {
            background: #d4edda;
            color: #155724;
        }

        .cliente-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid #eee;
            align-items: end;
            position: relative;
        }

        .full-width {
            grid-column: span 4;
        }

        .autocomplete-suggestions {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 1000;
            max-height: 200px;
            overflow-y: auto;
            width: 38%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .autocomplete-suggestion {
            padding: 10px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .autocomplete-suggestion:hover {
            background: #f0f0f0;
        }

        input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        #cnpjBusca.valido {
            background-color: #d4edda !important;
            border: 2px solid #27ae60 !important;
        }

        #cnpjBusca.invalido {
            background-color: #f8d7da !important;
            border: 2px solid #e74c3c !important;
        }

        .total-header-box {
            background: #eafaf1;
            border: 2px solid var(--green);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            height: 38px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .total-header-value {
            font-size: 20px;
            font-weight: 800;
            color: #1b5e20;
        }

        .box-search {
            background: var(--yellow);
            padding: 12px;
            border: 1px solid #f1c40f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 13px;
        }

        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            background: #fff;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--blue);
            color: white;
            padding: 8px 4px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 10px;
            text-transform: uppercase;
        }

        td {
            padding: 6px 4px;
            border-bottom: 1px solid #eee;
            font-size: 12px;
        }

        .col-cod {
            width: 110px;
        }

        .col-un {
            width: 35px;
            text-align: center;
        }

        .col-vlr {
            width: 95px;
            text-align: right;
        }

        .col-qtd {
            width: 60px;
            text-align: center;
        }

        .col-desc-p {
            width: 50px;
            text-align: center;
        }

        .col-desc-vlr {
            width: 60px;
            text-align: center;
        }

        .col-vlr-liq {
            width: 80px;
            /* Reduzido de 95px */
            text-align: right;
        }

        .col-tot {
            width: 80px;
            /* Reduzido de 105px */
            text-align: right;
        }

        .input-qtd,
        .input-desc,
        .input-desc-vlr {
            width: 100%;
            font-weight: bold;
            text-align: center;
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 4px 1px;
        }

        .print-text {
            display: none;
        }

        @media print {
            @page {
                margin: 1cm;
                size: portrait;
            }

            body {
                background: white !important;
                padding: 0 !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: none !important;
                padding: 0 !important;
            }

            /* Hide non-printable areas */
            .view-section:not(.active),
            #view-login,
            #view-admin,
            .box-search,
            .actions-footer,
            .btn,
            .status-sync,
            .version-footer,
            .autocomplete-suggestions,
            #cnpjBusca,
            .logout-btn-area {
                display: none !important;
            }

            .table-container {
                max-height: none !important;
                overflow: visible !important;
                border: none !important;
            }

            .cliente-grid {
                background: none;
                border: none;
                padding: 0;
                margin-bottom: 10px;
            }

            .print-text {
                display: block !important;
                font-size: 10px !important;
                font-weight: bold;
            }

            th:nth-child(4),
            td:nth-child(4),
            th:nth-child(10),
            td:nth-child(10) {
                display: none !important;
            }

            th:nth-child(1) {
                width: 11% !important;
            }

            /* Código */
            th:nth-child(2) {
                width: 34% !important;
            }

            /* Descrição mais larga */
            th:nth-child(3) {
                width: 3% !important;
            }

            /* UN */
            th:nth-child(5) {
                width: 11% !important;
            }

            /* Vlr C/ IPI */
            th:nth-child(6) {
                width: 5% !important;
            }

            /* Qtd */
            th:nth-child(7) {
                width: 6% !important;
            }

            /* D% */
            th:nth-child(8) {
                width: 7% !important;
            }

            /* D(R$) */
            th:nth-child(9) {
                width: 11% !important;
            }

            /* V.Un C/ IPI Desc */
            th:nth-child(11) {
                width: 12% !important;
            }

            /* Tot C/ IPI */

            table {
                border: 1px solid #000;
                width: 100% !important;
                table-layout: fixed;
                border-collapse: collapse !important;
            }

            th {
                background: #eee !important;
                color: #000 !important;
                border: 1px solid #000 !important;
                position: static !important;
            }

            td {
                border: 1px solid #000 !important;
                padding: 3px !important;
                font-size: 9px !important;
            }

            tbody tr {
                display: none !important;
            }

            tbody tr.has-qty {
                display: table-row !important;
            }

            input,
            textarea {
                display: none !important;
            }

            #p-obs {
                display: block !important;
                border: 1px solid #000;
                padding: 5px;
                font-size: 9px !important;
                margin-top: 10px;
            }
        }

        .actions-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 2px solid #eee;
            padding-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .btn-csv {
            background: var(--green);
            color: white;
        }

        .btn-print {
            background: #555;
            color: white;
        }

        .btn-zip {
            background: var(--purple);
            color: white;
        }

        .btn-clear {
            background: var(--red);
            color: white;
        }

        .btn-email {
            background: #e67e22;
            color: white;
        }

        .btn-logout {
            background: #7f8c8d;
            color: white;
            float: right;
            margin-left: 10px;
            padding: 5px 10px;
            font-size: 11px;
        }

        /* CONFIG SECTION STYLES */
        .config-section {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            font-size: 12px;
            border: 1px solid #ccc;
        }

        .config-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            color: var(--blue);
            text-transform: uppercase;
            font-size: 11px;
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .config-row label:not(.toggle-switch) {
            margin-bottom: 0;
            flex: 1;
            text-transform: none;
            font-size: 12px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .btn-small {
            padding: 4px 8px;
            font-size: 10px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .file-input-label {
            display: inline-block;
            padding: 4px 8px;
            background: #ddd;
            border: 1px solid #bbb;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        /* GRUPOS DE PRODUTOS */
        .group-header {
            background-color: #f1f3f5 !important;
            font-weight: bold;
            color: var(--blue);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .group-header td {
            padding: 8px 12px !important;
            border-bottom: 2px solid #dee2e6 !important;
            border-top: 1px solid #dee2e6 !important;
        }

        @media print {
            .group-header {
                background-color: #eee !important;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>

    <!-- TELA DE LOGIN -->
    <div id="view-login" class="container login-container view-section active">
        <!-- Removendo margin-top do estilo inline, usando apenas classe -->
        <span class="logo-login">🔐</span>
        <h2 style="color: var(--blue);">Acesso Restrito</h2>
        <div class="login-box">
            <input type="text" id="loginUser" placeholder="Usuário" onkeypress="handleEnter(event)">
            <input type="password" id="loginPass" placeholder="Senha" onkeypress="handleEnter(event)">
            <button class="login-btn" onclick="fazerLogin()">Entrar</button>
            <div id="loginMsg" style="color: red; margin-top: 10px; font-size: 12px;"></div>
        </div>

        <div class="config-section">
            <span class="config-title">⚙️ Configurações de Banco</span>
            <div class="config-row">
                <label>Carregar Banco Local (Automático)</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="modoOffline" onchange="toggleOffline(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <div style="margin-top: 10px;">
                <label>Carregar CSV Manual:</label>
                <div style="display: flex; gap: 5px; margin-top: 5px;">
                    <label class="file-input-label">
                        Produtos <input type="file" id="fileProdutos" style="display:none"
                            onchange="uploadLocal(this, 'produtos')">
                    </label>
                    <label class="file-input-label">
                        Clientes <input type="file" id="fileClientes" style="display:none"
                            onchange="uploadLocal(this, 'clientes')">
                    </label>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px; font-size: 11px; color: #888;">NEK Pedidos v3.2.7</div>
    </div>


    <!-- TELA DE VENDAS (Original) -->
    <div id="view-vendas" class="container view-section">
        <div class="header-top logout-btn-area">
            <div>
                <h2 style="margin:0; color:var(--blue);">🚲 NEK - Orçamento de Pedido</h2>
                <div id="syncStatus" class="status-sync">⏳ Conectando...</div>
            </div>
            <div style="text-align: right;">
                <div id="data-atual" style="font-weight: bold;"></div>
                <div style="font-size: 11px; color: #666; margin-top: 4px;">Logado como: <span
                        id="userLogado">...</span></div>
                <button class="btn-logout" onclick="fazerLogout()" style="margin-top: 5px;">Sair</button>
            </div>
        </div>

        <div class="cliente-grid">
            <div style="grid-column: span 2; position: relative;">
                <label>Razão Social</label>
                <input type="text" id="razaoSocial" autocomplete="off" placeholder="Busca interna...">
                <div id="sugestoes" class="autocomplete-suggestions"></div>
                <span class="print-text" id="p-razao"></span>
            </div>
            <div>
                <label>CNPJ</label>
                <input type="text" id="cnpjCadastrado" readonly placeholder="...">
                <span class="print-text" id="p-cnpj-cad"></span>
            </div>
            <div>
                <label>Consulta Externo</label>
                <input type="text" id="cnpjBusca" maxlength="18" placeholder="00.000.../0001-00">
            </div>

            <div style="grid-column: span 2;"><label>Endereço de Entrega</label><input type="text" id="endereco"><span
                    class="print-text" id="p-end"></span></div>
            <div><label>Nome do Contato</label><input type="text" id="nomeContato"><span class="print-text"
                    id="p-contato"></span></div>
            <div><label>Telefone</label><input type="text" id="telefone" maxlength="15"><span class="print-text"
                    id="p-tel"></span></div>

            <div class="full-width">
                <div class="total-header-box">
                    <div class="total-header-value" id="headerTotalGeral">R$ 0,00</div>
                </div>
            </div>
        </div>

        <div class="box-search">
            <input type="text" id="inputBusca" placeholder="Pesquisar produto...">
        </div>

        <div style="margin-top: 10px;">
            <label>Observações do Pedido</label>
            <textarea id="obsVenda" rows="2" placeholder="Digite observações importantes aqui..."></textarea>
            <div class="print-text" id="p-obs"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="col-cod">Código</th>
                        <th class="col-desc">Descrição</th>
                        <th class="col-un">UN</th>
                        <th class="col-vlr">Vlr S/ IPI</th>
                        <th class="col-vlr">Vlr C/ IPI</th>
                        <th class="col-qtd">Qtd</th>
                        <th class="col-desc-p">D%</th>
                        <th class="col-desc-vlr">D(R$)</th>
                        <th class="col-vlr-liq">V.Un C/ IPI Desc</th>
                        <th class="col-tot">Tot S/ IPI</th>
                        <th class="col-tot">Tot C/ IPI</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <div class="actions-footer">
            <button class="btn btn-clear" onclick="limparSistema()">🗑️ Limpar</button>
            <button class="btn btn-print" onclick="imprimirPDF()">🖨️ Imprimir</button>
            <button class="btn btn-csv" onclick="exportarCSV()">📄 Exportar CSV</button>
            <button class="btn btn-zip" onclick="baixarZIP()">📦 Baixar ZIP (Completo)</button>
            <button class="btn btn-email" onclick="enviarEmail()">📧 Enviar por E-mail</button>
        </div>

        <div style="text-align: center; font-size: 10px; color: #999; margin-top: 20px;" class="version-footer">
            SISTEMA NEK PEDIDOS | <strong>VERSÃO 3.2.7-LS</strong> | 2026
        </div>

    </div>

    <script>
        const SHEET_PRODUTOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsTin6EuEQtN4tznviYVRpJgjbzv0mgOiqKLQAju0VBDqySygOduDgQ7547zts4sowSfRsdwTTvVE5/pub?output=csv';
        const SHEET_CLIENTES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQYCLsgEtBzLW7931ivMquRWiwRl9twob9MOnuuQAA5MtukdGVOQPsJJiWsSlzlFZDzKpmj3nRAOoRJ/pub?output=csv';

        // --- SISTEMA DE LOGIN SIMPLIFICADO ---
        // Usuários Fixos (Hardcoded)
        const USERS = [
            { u: 'Marcelo', p: 'nekindustri@' },
            { u: 'Luciana', p: 'nekindustri@' },
            { u: 'Gloria', p: 'nekindustri@' },
            { u: 'Vendedor', p: 'vendedornek' }
        ];

        function handleEnter(e) {
            if (e.key === 'Enter') fazerLogin();
        }

        function fazerLogin() {
            const u = document.getElementById('loginUser').value.trim();
            const p = document.getElementById('loginPass').value.trim();

            // Busca insensitive para usuário, mas senha deve ser exata
            const found = USERS.find(x => x.u.toLowerCase() === u.toLowerCase() && x.p === p);

            if (found) {
                // Salva na sessão (memória temporária da aba)
                sessionStorage.setItem('nek_session', JSON.stringify({ u: found.u }));
                document.getElementById('loginMsg').innerText = "";
                redirecionar(found.u);
            } else {
                document.getElementById('loginMsg').innerText = "Usuário ou senha inválidos!";
            }
        }

        function fazerLogout() {
            sessionStorage.removeItem('nek_session');
            window.location.reload();
        }

        function checkSession() {
            const session = JSON.parse(sessionStorage.getItem('nek_session'));
            if (session) {
                redirecionar(session.u);
            } else {
                showView('view-login');
            }
        }

        function redirecionar(userName) {
            document.getElementById('userLogado').innerText = userName;
            showView('view-vendas');
            if (window.carregarDadosFaltantes) window.carregarDadosFaltantes();
        }

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // --- CARREGAMENTO LOCAL E MANUAL ---
        // Arquivos predefinidos para carregamento automático
        const LOCAL_PRODUTOS = 'db_produtos.csv';
        const LOCAL_CLIENTES = 'db_clientes.csv';

        let isOffline = localStorage.getItem('nek_offline') === 'true';

        function toggleOffline(checked) {
            localStorage.setItem('nek_offline', checked);
            isOffline = checked;
            alert(checked ? "Carregamento Local ATIVADO. O sistema buscará arquivos na mesma pasta do sistema." : "Carregamento Local DESATIVADO. O sistema buscará dados do Google Drive.");
            window.location.reload();
        }

        function uploadLocal(input, tipo) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const content = e.target.result;
                // Salva no sessionStorage para persistir apenas durante a sessão atual se houver reload manual
                sessionStorage.setItem('temp_csv_' + tipo, content);
                alert(`Arquivo de ${tipo} carregado com sucesso para esta sessão!`);
                window.location.reload();
            };
            reader.readAsText(file);
        }

        // --- CÓDIGO ORIGINAL (SISTEMA DE VENDAS) ---
        // Mantido quase idêntico, apenas encapsulado

        let listaClientes = [];
        document.getElementById('data-atual').innerText = "Data: " + new Date().toLocaleDateString('pt-BR');

        // --- FUNÇÕES AUXILIARES ---
        function aplicarMascaraCNPJ(v) {
            v = v.replace(/\D/g, "").substring(0, 14);
            return v.replace(/^(\d{2})(\d)/, "$1.$2").replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3").replace(/\.(\d{3})(\d)/, ".$1/$2").replace(/(\d{4})(\d)/, "$1-$2");
        }

        function validarCNPJ(cnpj) {
            cnpj = cnpj.replace(/[^\d]+/g, '');
            if (cnpj == '' || cnpj.length != 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
            let tam = cnpj.length - 2; let num = cnpj.substring(0, tam); let dig = cnpj.substring(tam); let soma = 0; let pos = tam - 7;
            for (let i = tam; i >= 1; i--) { soma += num.charAt(tam - i) * pos--; if (pos < 2) pos = 9; }
            let res = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            if (res != dig.charAt(0)) return false;
            tam = tam + 1; num = cnpj.substring(0, tam); soma = 0; pos = tam - 7;
            for (let i = tam; i >= 1; i--) { soma += num.charAt(tam - i) * pos--; if (pos < 2) pos = 9; }
            res = soma % 11 < 2 ? 0 : 11 - (soma % 11);
            return res == dig.charAt(1);
        }

        function parseCSVLine(line) {
            const result = []; let cur = ''; let inQuote = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuote = !inQuote;
                else if (char === ',' && !inQuote) { result.push(cur.trim()); cur = ''; }
                else cur += char;
            }
            result.push(cur.trim()); return result;
        }

        // --- PERSISTÊNCIA (LOCAL STORAGE) ---
        function salvarPedido() {
            const itens = [];
            document.querySelectorAll('tr.has-qty').forEach(tr => {
                itens.push({
                    c: tr.dataset.codB,
                    q: tr.querySelector('.input-qtd').value,
                    d: tr.querySelector('.input-desc').value,
                    dv: tr.querySelector('.input-desc-vlr') ? tr.querySelector('.input-desc-vlr').value : 0
                });
            });
            const dados = {
                razao: document.getElementById('razaoSocial').value,
                cnpjC: document.getElementById('cnpjCadastrado').value,
                cnpjB: document.getElementById('cnpjBusca').value,
                end: document.getElementById('endereco').value,
                cont: document.getElementById('nomeContato').value,
                tel: document.getElementById('telefone').value,
                obs: document.getElementById('obsVenda').value,
                itens: itens
            };
            localStorage.setItem('nek_cache_v3', JSON.stringify(dados));
        }

        function limparSistema() {
            if (confirm('Isso apagará todo o pedido atual. Confirma?')) {
                localStorage.removeItem('nek_cache_v3');
                const campos = ['razaoSocial', 'cnpjCadastrado', 'cnpjBusca', 'endereco', 'nomeContato', 'telefone', 'obsVenda', 'inputBusca'];
                campos.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = '';
                });
                document.getElementById('headerTotalGeral').innerText = "R$ 0,00";
                // Apenas recarrega a página, mantendo a sessão (pois está no sessionStorage)
                window.location.reload();
            }
        }

        // --- BUSCA CNPJ E AUTOCOMPLETE ---
        document.getElementById('cnpjBusca').addEventListener('input', async e => {
            let v = e.target.value.replace(/\D/g, "");
            e.target.value = aplicarMascaraCNPJ(v);
            if (v.length === 14 && validarCNPJ(v)) {
                e.target.className = 'valido';
                try {
                    const res = await fetch(`https://publica.cnpj.ws/cnpj/${v}`);
                    if (res.ok) {
                        const d = await res.json();
                        document.getElementById('razaoSocial').value = d.razao_social || "";
                        document.getElementById('cnpjCadastrado').value = "";
                        if (d.estabelecimento) {
                            const est = d.estabelecimento;
                            document.getElementById('endereco').value = `${est.logradouro}, ${est.numero} - ${est.bairro} - ${est.cidade.nome}/${est.estado.sigla}`;
                            document.getElementById('telefone').value = est.telefone1 || "";
                        }
                        salvarPedido();
                    }
                } catch (err) { }
            } else { e.target.className = v.length >= 14 ? 'invalido' : ''; }
        });

        async function carregarClientes() {
            try {
                let txt;
                // Ordem de prioridade: 1. Upload Manual (Sessão) -> 2. Arquivo Local (se toggle ativo) -> 3. Google Drive
                const tempCSV = sessionStorage.getItem('temp_csv_clientes');

                if (tempCSV) {
                    txt = tempCSV;
                    document.getElementById('syncStatus').innerText = "📁 Banco Manual (Sessão)";
                } else if (isOffline) {
                    const r = await fetch(LOCAL_CLIENTES);
                    if (!r.ok) throw new Error("Arquivo local não encontrado");
                    txt = await r.text();
                    document.getElementById('syncStatus').innerText = "📂 Banco Local (Auto)";
                } else {
                    const r = await fetch(SHEET_CLIENTES);
                    txt = await r.text();
                }

                const linhas = txt.split(/\r?\n/);
                linhas.forEach((linha, i) => {
                    if (i === 0 || !linha) return;
                    const c = parseCSVLine(linha);
                    if (c && c.length >= 5) {
                        listaClientes.push({ razao: c[0], cidade: c[1], endereco: c[2], telefone: c[3], cnpj: c[4] });
                    }
                });
            } catch (e) {
                console.error("Erro ao carregar clientes:", e);
            }
        }

        const inputRazao = document.getElementById('razaoSocial');
        const divSugestoes = document.getElementById('sugestoes');
        inputRazao.addEventListener('input', () => {
            const busca = inputRazao.value.toLowerCase();
            divSugestoes.innerHTML = '';
            if (busca.length < 2) return;
            listaClientes.filter(cli => cli.razao.toLowerCase().includes(busca)).slice(0, 8).forEach(cli => {
                const item = document.createElement('div');
                item.className = 'autocomplete-suggestion';
                item.innerText = `${cli.razao} (${cli.cidade})`;
                item.onclick = () => {
                    inputRazao.value = cli.razao;
                    document.getElementById('endereco').value = `${cli.endereco} - ${cli.cidade}`;
                    document.getElementById('telefone').value = cli.telefone;
                    document.getElementById('cnpjCadastrado').value = aplicarMascaraCNPJ(cli.cnpj);
                    document.getElementById('cnpjBusca').value = "";
                    divSugestoes.innerHTML = '';
                    salvarPedido();
                };
                divSugestoes.appendChild(item);
            });
        });

        // --- GERAÇÃO DE ARQUIVOS ---
        const getCnpjFinal = () => document.getElementById('cnpjCadastrado').value || document.getElementById('cnpjBusca').value;
        const getRazaoFinal = () => document.getElementById('razaoSocial').value || "CLIENTE_AVULSO";

        function gerarConteudoCSV() {
            let csv = "CD_PRODUTO;QUANTIDADE;VL_UNITARIO\n";
            document.querySelectorAll('tr.has-qty').forEach(tr => {
                const q = tr.querySelector('.input-qtd').value;
                const d = tr.querySelector('.input-desc').value;
                const vE_liq = (parseFloat(tr.dataset.valE) * (1 - (d / 100))).toFixed(2).replace('.', ',');
                csv += `${tr.dataset.codB};${q};${vE_liq}\n`;
            });
            return "\ufeff" + csv;
        }

        function exportarCSV() {
            const blob = new Blob([gerarConteudoCSV()], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `PEDIDO_${getRazaoFinal().replace(/\s+/g, '_')}.csv`;
            link.click();
        }

        async function gerarBlobZIP() {
            if (document.querySelectorAll('tr.has-qty').length === 0) {
                alert("Adicione produtos primeiro!");
                return null;
            }
            const zip = new JSZip();
            const r = getRazaoFinal().replace(/\s+/g, '_');
            zip.file(`IMPORTAR_${r}.csv`, gerarConteudoCSV());

            let resumo = `===========================================\n      RESUMO DO PEDIDO - NEK\n===========================================\n`;
            resumo += `Data:      ${new Date().toLocaleDateString('pt-BR')}\nCliente:   ${getRazaoFinal()}\nCNPJ:      ${getCnpjFinal()}\nTelefone:  ${document.getElementById('telefone').value}\nContato:   ${document.getElementById('nomeContato').value}\nEndereço:  ${document.getElementById('endereco').value}\n-------------------------------------------\nTOTAL DO PEDIDO: ${document.getElementById('headerTotalGeral').innerText}\n-------------------------------------------\nOBS: ${document.getElementById('obsVenda').value}\n\nITENS DO PEDIDO:\nCODIGO      | QTD | TOTAL C/ IPI\n`;
            document.querySelectorAll('tr.has-qty').forEach(tr => {
                resumo += `${tr.cells[0].innerText.padEnd(11)} | ${tr.querySelector('.input-qtd').value.padEnd(3)} | ${tr.cells[10].innerText}\n`;
            });
            resumo += `\n===========================================`;

            zip.file(`RESUMO_CLIENTE_${r}.txt`, resumo);
            return await zip.generateAsync({ type: "blob" });
        }

        async function baixarZIP() {
            const content = await gerarBlobZIP();
            if (!content) return; // Se retornou null (sem produtos)

            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            const r = getRazaoFinal().replace(/\s+/g, '_');
            link.download = `PEDIDO_${r}.zip`;
            link.click();
        }

        async function enviarEmail() {
            // 1. Gera e baixa o arquivo ZIP
            const content = await gerarBlobZIP();
            if (!content) return;

            const r = getRazaoFinal().replace(/\s+/g, '_');

            // Download do arquivo
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `PEDIDO_${r}.zip`;
            link.click();

            // 2. Abre o cliente de email
            const destinatario = "vendas@nek.com.br";
            const assunto = `PEDIDO_${r}.zip`; // Nome do arquivo sugerido no assunto
            const corpo = `Olá,\n\nSegue em anexo o pedido do cliente ${getRazaoFinal()}.\n\nArquivo: PEDIDO_${r}.zip (Já foi baixado para seu computador, por favor anexe-o aqui).\n\nAtenciosamente,`;

            const mailtoLink = `mailto:${destinatario}?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`;

            // Pequeno delay para garantir que o download iniciou visualmente antes de abrir o email
            setTimeout(() => {
                window.location.href = mailtoLink;
                alert("O arquivo do pedido foi BAIXADO no seu computador.\n\nO seu programa de e-mail será aberto agora.\n\nPOR FAVOR, ANEXE O ARQUIVO BAIXADO AO E-MAIL.");
            }, 1000);
        }

        function imprimirPDF() {
            const ids = ['razaoSocial', 'nomeContato', 'telefone', 'endereco', 'cnpjCadastrado', 'obsVenda'];
            ids.forEach(id => {
                let pId = id === 'razaoSocial' ? 'p-razao' : (id === 'nomeContato' ? 'p-contato' : (id === 'telefone' ? 'p-tel' : (id === 'endereco' ? 'p-end' : (id === 'cnpjCadastrado' ? 'p-cnpj-cad' : 'p-obs'))));
                let val = document.getElementById(id).value;
                if (id === 'cnpjCadastrado' && val === "") val = document.getElementById('cnpjBusca').value;
                document.getElementById(pId).innerText = val;
            });
            window.print();
        }

        // --- CARREGAMENTO DE PRODUTOS ---
        async function carregarProdutos() {
            const cache = JSON.parse(localStorage.getItem('nek_cache_v3') || "null");
            if (cache) {
                document.getElementById('razaoSocial').value = cache.razao || "";
                document.getElementById('cnpjCadastrado').value = cache.cnpjC || "";
                document.getElementById('cnpjBusca').value = cache.cnpjB || "";
                document.getElementById('endereco').value = cache.end || "";
                document.getElementById('nomeContato').value = cache.cont || "";
                document.getElementById('telefone').value = cache.tel || "";
                document.getElementById('obsVenda').value = cache.obs || "";
            }

            try {
                let txt;
                const tempCSV = sessionStorage.getItem('temp_csv_produtos');

                if (tempCSV) {
                    txt = tempCSV;
                    document.getElementById('syncStatus').innerText = "📁 Banco Manual (Sessão)";
                    document.getElementById('syncStatus').className = "status-sync sync-success";
                } else if (isOffline) {
                    const r = await fetch(LOCAL_PRODUTOS);
                    if (!r.ok) {
                        document.getElementById('syncStatus').innerText = "❌ Local não encontrado";
                        return;
                    }
                    txt = await r.text();
                    document.getElementById('syncStatus').innerText = "📂 Banco Local (Auto)";
                    document.getElementById('syncStatus').className = "status-sync sync-success";
                } else {
                    const r = await fetch(SHEET_PRODUTOS);
                    txt = await r.text();
                    document.getElementById('syncStatus').innerText = "✅ Sincronizado";
                    document.getElementById('syncStatus').className = "status-sync sync-success";
                }

                const linhas = txt.split(/\r?\n/);
                const tb = document.getElementById('corpoTabela');
                tb.innerHTML = ""; // Limpa antes de carregar

                const limparNum = (v) => {
                    if (!v) return 0;
                    let n = v.replace(/[^\d,.-]/g, '').trim();
                    if (n.includes(',') && n.includes('.')) n = n.replace(/\./g, '').replace(',', '.');
                    else n = n.replace(',', '.');
                    return parseFloat(n) || 0;
                };

                const grupos = {};
                const ordemCategorias = [];

                linhas.forEach((l, i) => {
                    if (i === 0 || !l) return;
                    let c = parseCSVLine(l);
                    if (c.length < 5) return;

                    // Coluna L é índice 11. Se não existir, agrupa em "GERAL"
                    const categoria = (c[11] || "GERAL").toUpperCase();
                    if (!grupos[categoria]) {
                        grupos[categoria] = [];
                        ordemCategorias.push(categoria);
                    }
                    grupos[categoria].push(c);
                });

                ordemCategorias.forEach(cat => {
                    // Cabeçalho do Grupo
                    const grTr = document.createElement('tr');
                    grTr.className = 'group-header';
                    grTr.dataset.catName = cat;
                    grTr.innerHTML = `<td colspan="11">📂 ${cat}</td>`;
                    tb.appendChild(grTr);

                    grupos[cat].forEach(c => {
                        const vE = limparNum(c[4]); const vG = limparNum(c[6]);
                        const codB = c[1];

                        const itemSalvo = cache ? cache.itens.find(it => it.c === codB) : null;
                        const qtdIni = itemSalvo ? itemSalvo.q : 0;
                        const descIni = itemSalvo ? itemSalvo.d : 0;
                        let descVlrIni = 0;
                        if (itemSalvo) {
                            if (itemSalvo.dv !== undefined) {
                                descVlrIni = parseFloat(itemSalvo.dv) || 0;
                            } else {
                                descVlrIni = vG * ((parseFloat(itemSalvo.d) || 0) / 100);
                            }
                        }

                        const tr = document.createElement('tr');
                        tr.dataset.valE = vE; tr.dataset.valG = vG; tr.dataset.codB = codB;
                        tr.dataset.search = (c[0] + c[1] + c[3]).toLowerCase();
                        tr.dataset.parentCat = cat;
                        tr.innerHTML = `<td class="col-cod">${c[0]}/${c[1]}</td><td class="col-desc">${c[3]}</td><td class="col-un">${c[2]}</td>
                        <td class="col-vlr">R$ ${vE.toFixed(2).replace('.', ',')}</td><td class="col-vlr">R$ ${vG.toFixed(2).replace('.', ',')}</td>
                        <td class="col-qtd"><input type="number" class="input-qtd" value="${qtdIni}" oninput="atu(this, null, true)" onfocus="this.select()"><span class="print-text">${qtdIni}</span></td>
                        <td class="col-desc-p"><input type="number" class="input-desc" value="${descIni}" oninput="atu(this, 'p', true)" onfocus="this.select()"><span class="print-text">${parseFloat(descIni).toFixed(2).replace('.', ',')}%</span></td>
                        <td class="col-desc-vlr"><input type="number" class="input-desc-vlr" value="${descVlrIni}" oninput="atu(this, 'v', true)" step="0.01" onfocus="this.select()"><span class="print-text">R$ ${descVlrIni.toFixed(2).replace('.', ',')}</span></td>
                        <td class="col-vlr-liq" style="text-align:right">R$ 0,00</td>
                        <td class="col-tot" style="text-align:right">R$ 0,00</td><td class="col-tot" style="text-align:right">R$ 0,00</td>`;
                        tb.appendChild(tr);
                        if (qtdIni > 0) atu(tr.querySelector('.input-qtd'), null, false);
                    });
                });
            } catch (e) {
                console.error(e);
                document.getElementById('syncStatus').innerText = "❌ Erro";
            }
        }

        function atu(el, changedType = null, salvar = true) {
            const tr = el.closest('tr');
            const q = parseFloat(tr.querySelector('.input-qtd').value) || 0;
            const inputD = tr.querySelector('.input-desc');
            const inputDV = tr.querySelector('.input-desc-vlr');

            const vE = parseFloat(tr.dataset.valE);
            const vG = parseFloat(tr.dataset.valG);

            let d = parseFloat(inputD.value) || 0;
            let dv = parseFloat(inputDV ? inputDV.value : 0) || 0;

            if (changedType === 'p') {
                dv = vG * (d / 100);
                if (inputDV) inputDV.value = dv ? parseFloat(dv.toFixed(2)) : 0;
            } else if (changedType === 'v') {
                if (vG > 0) d = (dv / vG) * 100;
                else d = 0;
                inputD.value = d ? parseFloat(d.toFixed(2)) : 0;
            } else {
                dv = vG * (d / 100);
                if (inputDV) inputDV.value = dv ? parseFloat(dv.toFixed(2)) : 0;
            }

            if (q > 0) tr.classList.add('has-qty'); else tr.classList.remove('has-qty');
            tr.querySelector('.input-qtd + .print-text').innerText = q;
            tr.querySelector('.input-desc + .print-text').innerText = d.toFixed(2).replace('.', ',') + "%";
            if (inputDV && tr.querySelector('.input-desc-vlr + .print-text')) {
                tr.querySelector('.input-desc-vlr + .print-text').innerText = "R$ " + dv.toFixed(2).replace('.', ',');
            }

            const vGLiq = vG * (1 - (d / 100));
            const subE = (vE * q) * (1 - (d / 100));
            const subG = (vG * q) * (1 - (d / 100));

            tr.cells[8].innerText = "R$ " + vGLiq.toFixed(2).replace('.', ',');
            tr.cells[9].innerText = "R$ " + subE.toFixed(2).replace('.', ',');
            tr.cells[10].innerText = "R$ " + subG.toFixed(2).replace('.', ',');

            let tot = 0;
            document.querySelectorAll('tr.has-qty').forEach(t => {
                tot += (parseFloat(t.dataset.valG) * (parseFloat(t.querySelector('.input-qtd').value) || 0)) * (1 - ((parseFloat(t.querySelector('.input-desc').value) || 0) / 100));
            });
            document.getElementById('headerTotalGeral').innerText = "R$ " + tot.toFixed(2).replace('.', ',');
            if (salvar) salvarPedido();
        }

        document.getElementById('inputBusca').onkeyup = function () {
            const f = this.value.toLowerCase();
            const visiveisPorCat = {};

            // Primeiro filtra os produtos e guarda quais categorias têm itens visíveis
            document.querySelectorAll('#corpoTabela tr:not(.group-header)').forEach(tr => {
                const searchMatch = tr.dataset.search.includes(f);
                tr.style.display = searchMatch ? "" : "none";
                if (searchMatch) {
                    visiveisPorCat[tr.dataset.parentCat] = true;
                }
            });

            // Depois mostra/esconde os cabeçalhos das categorias
            document.querySelectorAll('.group-header').forEach(gr => {
                gr.style.display = visiveisPorCat[gr.dataset.catName] ? "" : "none";
            });
        };

        ['razaoSocial', 'endereco', 'nomeContato', 'telefone', 'obsVenda'].forEach(id => {
            document.getElementById(id).addEventListener('change', salvarPedido);
        });

        // INICIALIZAÇÃO
        // Set toggle state
        document.getElementById('modoOffline').checked = isOffline;

        checkSession();
        carregarClientes();
        window.carregarDadosFaltantes = carregarProdutos;
        carregarProdutos();

    </script>
</body>
